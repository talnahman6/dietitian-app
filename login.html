<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסה — מירי הדיאטנית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --bg2: #0e1623;
  --card: #111827;
  --card2: #162032;
  --inp: #1a2640;
  --bdr: #1e2d45;
  --bdr2: #253550;
  --indigo: #6366f1;
  --purple: #8b5cf6;
  --green: #10b981;
  --red: #ef4444;
  --txt: #e8edf5;
  --txt2: #8096b4;
  --txt3: #4a607a;
  --r: 14px;
  --sh: 0 8px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 75% 20%,rgba(99,102,241,.07) 0%,transparent 55%),
  radial-gradient(ellipse at 25% 80%,rgba(16,185,129,.05) 0%,transparent 55%),
  radial-gradient(ellipse at 50% 50%,rgba(139,92,246,.04) 0%,transparent 70%);
  pointer-events:none;z-index:0}

.auth-wrap{position:relative;z-index:1;width:100%;max-width:440px}

.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .logo-icon{width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid var(--green);box-shadow:0 0 24px rgba(16,185,129,.35),0 0 60px rgba(16,185,129,.1);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:var(--card2)}
.auth-logo h1{font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#6366f1,#10b981 60%,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo p{color:var(--txt2);font-size:.9rem;margin-top:5px}

.auth-card{background:var(--card);border:1px solid var(--bdr);border-radius:20px;padding:32px;box-shadow:var(--sh)}
.auth-card h2{font-size:1.25rem;font-weight:800;margin-bottom:24px;color:var(--txt)}

.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.85rem;color:var(--txt2);margin-bottom:8px;font-weight:600}
.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="password"]{
  width:100%;background:var(--inp);border:1px solid var(--bdr);border-radius:12px;
  padding:14px 18px;color:var(--txt);font-family:'Heebo',sans-serif;font-size:1rem;
  outline:none;transition:border-color .2s,box-shadow .2s;direction:rtl}
.form-group input:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.form-group input::placeholder{color:var(--txt3)}

.remember-row{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.remember-row input[type="checkbox"]{
  width:18px;height:18px;accent-color:var(--indigo);cursor:pointer;flex-shrink:0}
.remember-row label{font-size:.88rem;color:var(--txt2);cursor:pointer;user-select:none}

.btn-submit{
  width:100%;background:linear-gradient(135deg,var(--indigo),var(--purple));
  border:none;color:#fff;border-radius:12px;padding:15px;
  font-family:'Heebo',sans-serif;font-size:1.05rem;font-weight:700;
  cursor:pointer;transition:all .2s}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(99,102,241,.42)}
.btn-submit:active{transform:translateY(0)}

.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:10px 14px;font-size:.85rem;color:#fca5a5;margin-bottom:16px;display:block;min-height:0}
.error-msg:empty{display:none}

.success-msg{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:10px;padding:10px 14px;font-size:.85rem;color:#6ee7b7;margin-bottom:16px}

.auth-link{text-align:center;margin-top:20px;font-size:.88rem;color:var(--txt2)}
.auth-link a{color:var(--indigo);text-decoration:none;font-weight:700}
.auth-link a:hover{text-decoration:underline}

.forgot-link-row{text-align:center;margin-top:16px;font-size:.88rem}
.forgot-link-row a{color:var(--txt2);text-decoration:none;font-weight:600}
.forgot-link-row a:hover{color:var(--indigo);text-decoration:underline}

.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.88rem;color:var(--txt2);text-decoration:none;font-weight:600;margin-bottom:20px;cursor:pointer;background:none;border:none;padding:0;font-family:'Heebo',sans-serif}
.back-link:hover{color:var(--indigo)}

@media(max-width:480px){
  .auth-card{padding:22px 18px}
  .auth-logo h1{font-size:1.5rem}
}
</style>
</head>
<body>
<div class="auth-wrap">

  <div class="auth-logo">
    <img src="images/yamu_jay-ai-generated-9044938.png" style="width:80px; height:80px; border-radius:50%; object-fit:cover; object-position:50% 15%; transform:scale(1.3);">
    <h1>מירי</h1>
    <p>הדיאטנית האישית שלך</p>
  </div>

  <div class="auth-card">
    <h2>כניסה לחשבון</h2>

    <div id="success-banner" class="success-msg" style="display:none">נרשמת בהצלחה! עכשיו תוכל/י להתחבר.</div>
  <div id="reset-banner" class="success-msg" style="display:none">שם המשתמש והסיסמה עודכנו בהצלחה</div>
    <span class="error-msg" id="login-error"></span>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-username">שם משתמש</label>
        <input type="text" id="login-username" placeholder="הקלד שם משתמש" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="login-password">סיסמא</label>
        <input type="password" id="login-password" placeholder="הקלד סיסמא" autocomplete="current-password" required>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="login-remember">
        <label for="login-remember">זכור אותי</label>
      </div>

      <button type="submit" class="btn-submit">כניסה ✓</button>
    </form>
  </div>

  <div class="forgot-link-row">
    <a href="#" onclick="showForgot(event)">שכחתי סיסמה</a>
  </div>

  <div class="auth-link">
    אין לך חשבון? <a href="register.html">הרשמה</a>
  </div>

  <!-- Reset Password Screen (hidden by default) -->
  <div id="reset-screen" style="display:none">
    <div class="auth-card">
      <button class="back-link" onclick="showForgot(null)">&#8592; חזרה</button>
      <h2>איפוס סיסמה</h2>

      <div class="success-msg" style="margin-bottom:18px">
        קוד האיפוס שלך: <strong id="reset-code-display" style="font-size:1.3rem;letter-spacing:4px;color:#10b981"></strong>
      </div>

      <span class="error-msg" id="reset-error"></span>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label for="reset-code-input">קוד אימות</label>
          <input type="text" id="reset-code-input" placeholder="הזן את הקוד" maxlength="4" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label for="reset-new-username">שם משתמש חדש</label>
          <input type="text" id="reset-new-username" placeholder="הזן שם משתמש חדש" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="reset-new-password">סיסמא חדשה</label>
          <input type="password" id="reset-new-password" placeholder="הזן סיסמא חדשה" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-submit">עדכן פרטים ✓</button>
      </form>
    </div>
  </div>

  <!-- Forgot Password Screen (hidden by default) -->
  <div id="forgot-screen" style="display:none">
    <div class="auth-card">
      <button class="back-link" onclick="showLogin()">&#8592; חזרה לכניסה</button>
      <h2>שכחתי סיסמה</h2>

      <span class="error-msg" id="forgot-error"></span>
      <div id="forgot-success" class="success-msg" style="display:none">אם הכתובת קיימת במערכת, ישלח אליה מייל לאיפוס סיסמה.</div>

      <form id="forgot-form" onsubmit="handleForgot(event)">
        <div class="form-group">
          <label for="forgot-email">כתובת אימייל</label>
          <input type="email" id="forgot-email" placeholder="הקלד כתובת אימייל" autocomplete="email">
        </div>

        <button type="submit" class="btn-submit">שלח קישור לאיפוס</button>
      </form>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/auth.js"></script>
<script>
  /* show success banner after registration */
  var params = new URLSearchParams(location.search);
  if (params.get('registered') === '1') {
    document.getElementById('success-banner').style.display = 'block';
  }
  if (params.get('reset') === '1') {
    document.getElementById('reset-banner').style.display = 'block';
  }

  var loginSection  = document.querySelector('.auth-card');
  var forgotSection = document.getElementById('forgot-screen');
  var loginLinks    = document.querySelectorAll('.forgot-link-row, .auth-link');

  var resetSection = document.getElementById('reset-screen');

  function showForgot(e) {
    if (e) e.preventDefault();
    loginSection.style.display  = 'none';
    resetSection.style.display  = 'none';
    forgotSection.style.display = 'block';
    loginLinks.forEach(function(el){ el.style.display = 'none'; });
    document.getElementById('forgot-error').textContent = '';
    document.getElementById('forgot-success').style.display = 'none';
    document.getElementById('forgot-email').value = '';
  }

  function showLogin() {
    forgotSection.style.display = 'none';
    resetSection.style.display  = 'none';
    loginSection.style.display  = 'block';
    loginLinks.forEach(function(el){ el.style.display = ''; });
  }

  function handleForgot(e) {
    e.preventDefault();
    var email = document.getElementById('forgot-email').value.trim();
    var err   = document.getElementById('forgot-error');
    err.textContent = '';
    document.getElementById('forgot-success').style.display = 'none';

    if (!email) {
      err.textContent = 'יש להזין כתובת אימייל.';
      return;
    }

    var users = getUsers();
    var user  = users.find(function(u){ return u.email === email; });
    if (!user) {
      err.textContent = 'לא נמצא חשבון עם כתובת אימייל זו.';
      return;
    }

    var code = String(Math.floor(1000 + Math.random() * 9000));
    localStorage.setItem('resetCode', JSON.stringify({ code: code, username: user.username }));

    document.getElementById('reset-code-display').textContent = code;
    showReset();
  }

  function showReset() {
    forgotSection.style.display = 'none';
    document.getElementById('reset-screen').style.display = 'block';
    document.getElementById('reset-error').textContent = '';
    document.getElementById('reset-code-input').value = '';
    document.getElementById('reset-new-username').value = '';
    document.getElementById('reset-new-password').value = '';
  }

  function handleReset(e) {
    e.preventDefault();
    var enteredCode  = document.getElementById('reset-code-input').value.trim();
    var newUsername  = document.getElementById('reset-new-username').value.trim().toLowerCase();
    var newPassword  = document.getElementById('reset-new-password').value;
    var err          = document.getElementById('reset-error');
    err.textContent  = '';

    var stored = null;
    try { stored = JSON.parse(localStorage.getItem('resetCode')); } catch(ex) {}

    if (!stored) {
      err.textContent = 'פג תוקף הקוד, נסה שוב.';
      return;
    }
    if (enteredCode !== stored.code) {
      err.textContent = 'הקוד שהוזן שגוי.';
      return;
    }
    if (!newUsername) {
      err.textContent = 'יש להזין שם משתמש חדש';
      return;
    }
    if (!newPassword) {
      err.textContent = 'יש להזין סיסמה חדשה';
      return;
    }

    updateCredentials(stored.username, newUsername, newPassword);
    localStorage.removeItem('resetCode');
    window.location.href = 'login.html?reset=1';
  }
</script>
</body>
</html>
