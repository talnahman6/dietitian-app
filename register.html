<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הרשמה — מירי הדיאטנית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --card: #ffffff;
  --card2: #f9f7f4;
  --inp: #f0ede8;
  --bdr: #e8e3da;
  --bdr2: #d8d1c6;
  --green: #4a9b7f;
  --green2: #3d8870;
  --green-light: #eaf5f1;
  --red: #dc4f4f;
  --txt: #1a1a2a;
  --txt2: #6b7280;
  --txt3: #a0aab4;
  --sh2: 0 8px 32px rgba(0,0,0,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;direction:rtl;display:flex;align-items:center;justify-content:center;padding:20px}

.auth-wrap{width:100%;max-width:420px}

.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .logo-icon{width:80px;height:80px;border-radius:50%;margin:0 auto 12px;background:linear-gradient(135deg,#4a9b7f,#3d8870);display:flex;align-items:center;justify-content:center;font-size:2.4rem;box-shadow:0 4px 20px rgba(74,155,127,.35)}
.auth-logo h1{font-size:1.85rem;font-weight:900;color:var(--green);letter-spacing:-.5px}
.auth-logo p{color:var(--txt2);font-size:.88rem;margin-top:4px}

.auth-card{background:var(--card);border-radius:22px;padding:28px 26px;box-shadow:var(--sh2)}
.auth-card h2{font-size:1.15rem;font-weight:800;margin-bottom:20px;color:var(--txt)}

.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:.82rem;color:var(--txt2);margin-bottom:7px;font-weight:700}
.form-group input[type="text"],
.form-group input[type="password"],
.form-group input[type="email"],
.form-group input[type="tel"]{
  width:100%;background:var(--inp);border:1.5px solid var(--bdr);border-radius:12px;
  padding:12px 16px;color:var(--txt);font-family:'Heebo',sans-serif;font-size:.93rem;
  outline:none;transition:border-color .2s,box-shadow .2s;direction:rtl}
.form-group input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(74,155,127,.12)}
.form-group input::placeholder{color:var(--txt3)}

.hint{font-size:.73rem;color:var(--txt3);margin-top:5px}

.btn-submit{
  width:100%;background:var(--green);
  border:none;color:#fff;border-radius:13px;padding:14px;
  font-family:'Heebo',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;transition:all .2s;margin-top:6px;
  box-shadow:0 4px 16px rgba(74,155,127,.32)}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(74,155,127,.42)}
.btn-submit:active{transform:translateY(0)}

.error-msg{background:rgba(220,79,79,.08);border:1px solid rgba(220,79,79,.2);border-radius:10px;padding:10px 14px;font-size:.82rem;color:var(--red);margin-bottom:14px;display:block;min-height:0}
.error-msg:empty{display:none}

.auth-link{text-align:center;margin-top:18px;font-size:.86rem;color:var(--txt2)}
.auth-link a{color:var(--green);text-decoration:none;font-weight:800}
.auth-link a:hover{text-decoration:underline}

@media(max-width:480px){
  .auth-card{padding:20px 16px}
  .auth-logo h1{font-size:1.6rem}
}
</style>
</head>
<body>
<div class="auth-wrap">

  <div class="auth-logo">
    <div class="logo-icon">🥗</div>
    <h1>מירי</h1>
    <p>הדיאטנית האישית שלך</p>
  </div>

  <div class="auth-card">
    <h2>יצירת חשבון חדש</h2>

    <span class="error-msg" id="reg-error"></span>

    <form id="reg-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="reg-fullname">שם מלא</label>
        <input type="text" id="reg-fullname" placeholder="הקלד שם מלא" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="reg-username">שם משתמש</label>
        <input type="text" id="reg-username" placeholder="הקלד שם משתמש (באנגלית)" autocomplete="username" required>
        <p class="hint">שם המשתמש חייב להיות ייחודי</p>
      </div>

      <div class="form-group">
        <label for="reg-email">אימייל</label>
        <input type="email" id="reg-email" placeholder="example@mail.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="reg-phone">טלפון</label>
        <input type="tel" id="reg-phone" placeholder="05X-XXXXXXX" autocomplete="tel" required>
      </div>

      <div class="form-group">
        <label for="reg-password">סיסמא</label>
        <input type="password" id="reg-password" placeholder="לפחות 6 תווים" autocomplete="new-password" required>
      </div>

      <div class="form-group">
        <label for="reg-confirm">אישור סיסמא</label>
        <input type="password" id="reg-confirm" placeholder="הקלד שוב את הסיסמא" autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn-submit">
  הרשמה ✓
</button>
    </form>
  </div>

  <div class="auth-link">
    כבר רשום? <a href="login.html">כנס כאן</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/auth.js"></script>
</body>
</html>
